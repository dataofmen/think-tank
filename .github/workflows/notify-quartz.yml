name: Notify Quartz to Sync

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Quartz rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.QUARTZ_TRIGGER_TOKEN }}" \
            https://api.github.com/repos/dataofmen/think-tank-site/dispatches \
            -d '{"event_type":"sync-content"}'